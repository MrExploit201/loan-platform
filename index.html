<!DOCTYPE html>
<html>
<head>
<title>Loan Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; margin:0; background:#f4f4f4; }
header { background:#0a2540; color:white; padding:15px; text-align:center; }

.container { padding:20px; }

.card {
    background:white;
    padding:20px;
    border-radius:10px;
    margin:10px auto;
    max-width:400px;
}

input {
    width:100%;
    padding:10px;
    margin:10px 0;
}

button {
    width:100%;
    padding:10px;
    background:#0a2540;
    color:white;
    border:none;
}

.hidden { display:none; }

.dashboard {
    text-align:center;
}

.lead {
    background:#fff;
    margin:10px;
    padding:10px;
    border-radius:8px;
}
</style>
</head>

<body>

<header>
<h2>Loan Dashboard System</h2>
</header>

<div class="container">

<!-- LOGIN -->
<div id="login" class="card">
<h3>Login</h3>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
<h3 style="text-align:center;">Welcome Admin</h3>

<div class="card">
<h4>Add Lead</h4>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="income" placeholder="Income">
<button onclick="addLead()">Save Lead</button>
</div>

<div class="card">
<h4>All Leads</h4>
<div id="leads"></div>
<button onclick="exportCSV()">Download Leads</button>
</div>

<button onclick="logout()">Logout</button>

</div>

</div>

<script>
// Default login
const defaultUser = "admin";
const defaultPass = "1234";

// LOGIN
function login(){
    let u = document.getElementById("username").value;
    let p = document.getElementById("password").value;

    if(u === defaultUser && p === defaultPass){
        localStorage.setItem("login", "true");
        showDashboard();
    } else {
        alert("Wrong login");
    }
}

// SHOW DASHBOARD
function showDashboard(){
    document.getElementById("login").style.display="none";
    document.getElementById("dashboard").classList.remove("hidden");
    loadLeads();
}

// LOGOUT
function logout(){
    localStorage.removeItem("login");
    location.reload();
}

// CHECK LOGIN
if(localStorage.getItem("login") === "true"){
    showDashboard();
}

// ADD LEAD
function addLead(){
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let income = document.getElementById("income").value;

    let leads = JSON.parse(localStorage.getItem("leads")) || [];

    leads.push({name, phone, income});
    localStorage.setItem("leads", JSON.stringify(leads));

    loadLeads();
}

// LOAD LEADS
function loadLeads(){
    let leads = JSON.parse(localStorage.getItem("leads")) || [];
    let html = "";

    leads.forEach(l => {
        html += `<div class="lead">${l.name} - ${l.phone} - ₹${l.income}</div>`;
    });

    document.getElementById("leads").innerHTML = html;
}

// EXPORT CSV
function exportCSV(){
    let leads = JSON.parse(localStorage.getItem("leads")) || [];
    let csv = "Name,Phone,Income\n";

    leads.forEach(l => {
        csv += `${l.name},${l.phone},${l.income}\n`;
    });

    let blob = new Blob([csv], {type: "text/csv"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "leads.csv";
    a.click();
}
</script>

</body>
</html>
